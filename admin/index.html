<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>WagerAds — Backoffice</title>
<link rel="icon" href="/icons/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --ink: #0B0B0C;
    --ink-soft: #1A1A1D;
    --graphite: #2A2D33;
    --paper: #F4F1EA;
    --paper-warm: #E8DFCF;
    --stone: #9C9A93;
    --slate: #5C5A55;
    --line: rgba(11,11,12,0.10);
    --line-strong: rgba(11,11,12,0.18);
    --danger: #B43A2E;
    --success: #1D6F3F;
  }
  html, body { margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:'Inter Tight',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  body { min-height: 100vh; }
  a { color: inherit; }
  button { font: inherit; cursor: pointer; }
  input, textarea, select { font: inherit; }

  .label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--slate); }

  /* Top bar */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--line); background:var(--paper); position:sticky; top:0; z-index:10; }
  .topbar h1 { margin:0; font-size:14px; letter-spacing:0.04em; font-weight:700; }
  .topbar h1 span { color: var(--slate); font-weight:500; margin-left:8px; }
  .topbar .actions { display:flex; gap:10px; align-items:center; }
  .icon-btn { background:transparent; border:1px solid var(--line); padding:8px 12px; font-size:12px; color:var(--slate); transition:background .15s, color .15s, border-color .15s; }
  .icon-btn:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* Login */
  .login-wrap { min-height: calc(100vh - 60px); display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .login-card { width:100%; max-width:420px; background:var(--paper-warm); border:1px solid var(--line); padding:36px; }
  .login-card h2 { margin:0 0 6px; font-size:24px; letter-spacing:-0.02em; }
  .login-card p { margin:0 0 24px; color:var(--slate); font-size:14px; line-height:1.5; }
  .login-card label { display:block; margin-bottom:8px; }
  .login-card input { width:100%; padding:14px 16px; font-size:14px; background:var(--paper); border:1px solid var(--line-strong); color:var(--ink); outline:none; }
  .login-card input:focus { border-color:var(--ink); }
  .login-card .err { margin-top:14px; color:var(--danger); font-size:13px; min-height:18px; }
  .login-card button { width:100%; margin-top:16px; padding:14px 16px; background:var(--ink); color:var(--paper); border:none; font-size:13px; font-weight:600; letter-spacing:0.02em; transition:background .15s; }
  .login-card button:hover { background:var(--ink-soft); }
  .login-card button:disabled { opacity:.5; cursor:not-allowed; }

  /* Stats strip */
  .stats { display:grid; grid-template-columns:repeat(6, 1fr); border-bottom:1px solid var(--line); }
  .stat { padding:16px 24px; border-right:1px solid var(--line); display:flex; flex-direction:column; gap:6px; }
  .stat:last-child { border-right:none; }
  .stat .n { font-family:'Inter Tight',sans-serif; font-size:22px; font-weight:600; letter-spacing:-0.02em; }
  .stat .l { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--slate); }

  /* Kanban */
  .board-wrap { padding:20px; overflow-x:auto; }
  .board { display:grid; grid-template-columns:repeat(6, minmax(280px, 1fr)); gap:16px; min-height: calc(100vh - 240px); }
  .col { display:flex; flex-direction:column; min-width:0; }
  .col-head { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; margin-bottom:12px; background:var(--paper-warm); border:1px solid var(--line); }
  .col-head .name { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink); }
  .col-head .count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--slate); }
  .col-head .dot { width:7px; height:7px; border-radius:50%; margin-right:7px; vertical-align:middle; display:inline-block; }
  .col-body { display:flex; flex-direction:column; gap:10px; flex:1; min-height: 80px; padding:6px; border:1px dashed transparent; transition:border-color .15s, background .15s; }
  .col-body.is-drop-target { border-color:var(--ink); background:rgba(11,11,12,0.03); }

  .card { background:var(--paper); border:1px solid var(--line); padding:14px; cursor:grab; transition:border-color .15s, transform .1s; user-select:none; }
  .card:hover { border-color:var(--line-strong); }
  .card:active { cursor:grabbing; }
  .card.is-dragging { opacity:.4; }
  .card .co { font-weight:600; font-size:14px; letter-spacing:-0.01em; line-height:1.3; word-break:break-word; }
  .card .person { color:var(--slate); font-size:12px; margin-top:4px; word-break:break-word; }
  .card .meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .card .pill { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:3px 7px; background:var(--paper-warm); color:var(--slate); border:1px solid var(--line); }
  .card .pill.spend { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .card .ago { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--stone); margin-top:8px; display:block; }

  .empty { color:var(--stone); font-size:12px; padding:20px 6px; text-align:center; font-style:italic; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(11,11,12,0.55); display:none; align-items:flex-start; justify-content:center; padding:60px 20px 20px; z-index:50; overflow-y:auto; }
  .modal-bg.is-open { display:flex; }
  .modal { background:var(--paper); width:100%; max-width:640px; border:1px solid var(--line-strong); }
  .modal header { padding:24px 28px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  .modal header .co { font-size:22px; font-weight:600; letter-spacing:-0.02em; line-height:1.2; }
  .modal header .close { background:transparent; border:none; font-size:24px; line-height:1; color:var(--slate); padding:0; }
  .modal header .close:hover { color:var(--ink); }
  .modal .body { padding:24px 28px; display:grid; grid-template-columns:120px 1fr; gap:14px 20px; }
  .modal .body .l { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--slate); padding-top:3px; }
  .modal .body .v { font-size:14px; line-height:1.5; word-break:break-word; }
  .modal .body .v a { color:var(--ink); text-decoration:underline; text-underline-offset:2px; }
  .modal .body .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .modal .body .chips span { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; padding:3px 7px; background:var(--paper-warm); border:1px solid var(--line); }
  .modal .body select { padding:10px 12px; font-size:13px; border:1px solid var(--line-strong); background:var(--paper); width:100%; max-width:240px; }
  .modal .body textarea { width:100%; min-height:90px; resize:vertical; padding:12px; font-size:13px; font-family:'Inter Tight',sans-serif; border:1px solid var(--line-strong); background:var(--paper); color:var(--ink); outline:none; line-height:1.5; }
  .modal .body textarea:focus, .modal .body select:focus { border-color:var(--ink); }
  .modal footer { padding:18px 28px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px; align-items:center; }
  .modal footer .status { color:var(--slate); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; margin-right:auto; }
  .modal footer .status.ok { color:var(--success); }
  .modal footer .status.err { color:var(--danger); }
  .modal footer button { padding:10px 18px; font-size:13px; border:1px solid var(--ink); background:var(--paper); color:var(--ink); }
  .modal footer button.primary { background:var(--ink); color:var(--paper); }
  .modal footer button:hover { background:var(--ink); color:var(--paper); }
  .modal footer button.primary:hover { background:var(--ink-soft); border-color:var(--ink-soft); }

  /* Stage colour dots */
  .dot-new       { background:#9C9A93; }
  .dot-contacted { background:#3A6FB0; }
  .dot-qualified { background:#9A7B1F; }
  .dot-meeting   { background:#7C3AAD; }
  .dot-won       { background:#1D6F3F; }
  .dot-lost      { background:#B43A2E; }

  /* Banner */
  .banner { padding:10px 24px; font-size:13px; background:var(--paper-warm); border-bottom:1px solid var(--line); color:var(--slate); }
  .banner.err { background:#FBE7E5; color:var(--danger); }

  /* Loading shimmer */
  .skeleton { color:var(--stone); padding:24px; font-size:13px; }

  @media (max-width: 920px) {
    .stats { grid-template-columns:repeat(3, 1fr); }
    .stat:nth-child(3n) { border-right:none; }
    .stat:nth-child(-n+3) { border-bottom:1px solid var(--line); }
    .modal .body { grid-template-columns:1fr; gap:6px 0; }
    .modal .body .l { padding-top:14px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script type="module" src="./app.js"></script>

</body>
</html>
